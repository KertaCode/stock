spring.application.name=Stock
server.port = 8080

spring.datasource.url=jdbc:mysql://localhost:3306/stock_bdd?useSSL=false&serverTimezone=Africa/Kinshasa&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=bonjour

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyJpaCompliantImpl

spring.jackson.time-zone=Africa/Kinshasa